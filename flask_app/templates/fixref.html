{% extends "_base.html" %}
{% from "_macros.html" import csrf %}

{% block content %}
<div class="card">
  <div class="card-header" style="font-weight:bold;">
    <h3>{{ title or "Normalize references" }}</h3>
  </div>
  <div class="card-body">
    <p class="text-muted">
      Normalize <code>cite</code>-template formatting on mdwiki pages.
      Provide one of: a title list, a category to walk, or a number of
      mainspace pages to scan.
    </p>
    <form method="POST" action="{{ url_for('fixref.fixref_post') }}">
      {{ csrf() }}
      <div class="mb-3">
        <label for="fixref-titlelist" class="form-label">Title list (one per line)</label>
        <textarea id="fixref-titlelist" name="titlelist" class="form-control" rows="6"
          placeholder="Aspirin&#10;Paracetamol">{{ form_titlelist or 'User:Mr. Ibrahem/test' }}</textarea>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label for="fixref-cat" class="form-label">Category</label>
          <input id="fixref-cat" name="cat" type="text" class="form-control" value="{{ form_cat or '' }}"
            placeholder="e.g. CS1_errors:_deprecated_parameters">
        </div>
        <div class="col-md-6">
          <label for="fixref-number" class="form-label">Or first N mainspace pages</label>
          <input id="fixref-number" name="number" type="number" min="1" class="form-control"
            value="{{ form_number or '' }}" placeholder="e.g. 1000">
        </div>
      </div>
      <button class="btn btn-outline-primary" type="submit">Start</button>
    </form>
  </div>
</div>
{% endblock %}
