{% extends "admins/base1.html" %}

{% block title %}Users · Copy SVG Translation{% endblock %}

{% block contents %}

<div class="card">
    <div class="card-header">
        <h3 class="headline">Users</h3>

    </div>
    <div class="card-body">
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h2 class="h6 text-uppercase text-muted">Total Users</h2>
                        <p class="display-6 mb-0">{{ total_users }}</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="table-responsive shadow-sm">
            <table class="table table-striped table-hover align-middle mb-0 DataTable">
                <thead>
                    <tr>
                        <th scope="col" style="width: 5%">ID</th>
                        <th scope="col">User</th>
                        <th scope="col" class="text-center" style="width: 15%">Active</th>
                        <th scope="col" class="text-center" style="width: 10%">Delete</th>
                    </tr>
                </thead>
                <tbody>
                    {% for coordinator in users %}
                    <tr>
                        <td>{{ coordinator.id }}</td>
                        <td>{{ coordinator.username }}</td>
                        <td class="text-center">
                        </td>
                        <td class="text-center">
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </div>
</div>
{% endblock %}
