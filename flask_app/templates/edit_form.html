{%- macro edit_form(title, domain, newtext) -%}
<div class="card mt-3">
    <div class="card-header aligncenter" style="font-weight:bold;">
        <h3>
            <i class="bi bi-file-earmark-text"></i>
            <a target="_blank" href="https://{{ domain }}/w/index.php?title={{ title }}">
                {{ title }}
            </a>
        </h3>
    </div>
    <div class="card-body">
        <form id="editform" name="editform" method="POST"
            action="https://{{ domain }}/w/index.php?title={{ title }}&action=submit" target="_blank">
            <input type="hidden" value="" name="wpEdittime">
            <input type="hidden" value="" name="wpStarttime">
            <input type="hidden" value="" name="wpScrolltop" id="wpScrolltop">
            <input type="hidden" value="12" name="parentRevId">
            <input type="hidden" value="wikitext" name="model">
            <input type="hidden" value="text/x-wiki" name="format">
            <input type="hidden" value="1" name="wpUltimateParam">
            <input type="hidden" name="wpSummary" value="Fix references">
            <input type="hidden" id="wikitext-old" value="">
            <div class="mb-3">
                <label for="wikitext-new" class="form-label fw-semibold">
                    New Wikitext
                </label>
                <textarea id="wikitext-new" class="form-control" name="wpTextbox1" rows="5">{{ newtext }}</textarea>
            </div>
            <div class="editOptions aligncenter">
                <input id="wpPreview" type="submit" class="btn btn-outline-primary" tabindex="5" title="[p]"
                    accesskey="p" name="wpPreview" value="Preview changes" fdprocessedid="nudjzu">
                <input id="wpDiff" type="submit" class="btn btn-outline-primary" tabindex="7" name="wpDiff"
                    value="show changes" accesskey="v" title="show changes." fdprocessedid="81zdl">
                <div class="editButtons">
                </div>
            </div>
        </form>
    </div>
</div>

{%- endmacro -%}
